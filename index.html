<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>메이플랜드 홀리심볼 버프 타이머</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🔔 홀리심볼 버프 타이머</h1>
            <p class="subtitle">자동 알림 · 무설치 · 100% 무료</p>
            <p class="hint">게임 창을 공유하면 자동으로 홀리심볼 버프를 감지합니다</p>
        </header>

        <section class="panel">
            <div class="controls">
                <button id="startShareBtn" class="btn btn-primary">
                    🖥️ 화면 공유 시작
                </button>
                <button id="stopShareBtn" class="btn btn-secondary" disabled>
                    ⏹️ 공유 중지
                </button>
                <button id="startDetectBtn" class="btn btn-success" disabled>
                    🔍 탐지 시작
                </button>
                <button id="stopDetectBtn" class="btn btn-secondary" disabled>
                    ⏸️ 탐지 중지
                </button>
                <button id="togglePipBtn" class="btn btn-pip" aria-pressed="false">
                    📺 PIP 모드
                </button>
                <button id="toggleOverlayBtn" class="btn btn-secondary" aria-pressed="false">
                    👁️ 영역 표시
                </button>
            </div>

            <div class="settings-row">
                <label class="setting-item" for="alertSeconds">
                    <span class="label">알림 시간(초 전)</span>
                    <input id="alertSeconds" type="number" min="1" max="60" value="5" step="1">
                </label>
            </div>

            <div class="status-bar">
                <div class="status-item">
                    <span class="label">공유 상태</span>
                    <span id="shareStatus" class="value status-off">OFF</span>
                </div>
                <div class="status-item">
                    <span class="label">탐지 상태</span>
                    <span id="detectStatus" class="value state-idle">IDLE</span>
                </div>
            </div>

            <div class="remaining-box" aria-label="잔여 시간">
                <span class="remaining-label">잔여 시간</span>
                <span id="remainingTime" class="remaining-value">--:--</span>
            </div>

            <div class="progress-wrapper" aria-label="잔여시간 프로그레스">
                <div id="progressBar" class="progress-bar level-high" style="width: 0%"></div>
            </div>
        </section>

        <section class="panel preview-panel">
            <h2>📺 프리뷰</h2>
            <div class="preview-wrapper">
                <video id="preview" autoplay muted playsinline></video>
                <canvas id="overlayCanvas" class="overlay-canvas"></canvas>
                <div id="previewPlaceholder" class="preview-placeholder">
                    <span class="icon">📡</span>
                    <p>화면 공유를 시작하면 여기에 표시됩니다</p>
                </div>
            </div>
        </section>

        <footer class="footer">
            <a href="POLICY.md" class="btn btn-secondary" target="_blank" rel="noopener">📜 정책 보기</a>
            <span class="footer-note">측정·알림 전용, 자동화 아님</span>
        </footer>
    </div>

    <canvas id="analysisCanvas" style="display:none;"></canvas>
    <div id="flashOverlay" class="flash-overlay" style="display:none;"></div>

    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script async src="https://docs.opencv.org/4.x/opencv.js" onload="window.__opencvReady=true"></script>
    <script src="js/storage.js"></script>
    <script src="js/notifier.js"></script>
    <script src="js/capture.js"></script>
    <script src="js/detector.js"></script>
    <script src="js/ocr.js"></script>
    <script src="js/overlay.js"></script>
    <script src="js/pip.js"></script>
    <script src="js/timer.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
